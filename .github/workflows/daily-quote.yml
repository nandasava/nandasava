name: Daily Coding Quote

on:
  schedule:
    # Runs at 00:00 UTC every day (may drift a bit — GitHub schedules are "best effort")
    - cron: '0 0 * * *'
  # Allows you to manually trigger the action from the GitHub 'Actions' tab
  workflow_dispatch:

jobs:
  update-profile:
    runs-on: ubuntu-latest

    # Critical: Give the action permission to push code back to the repo
    permissions:
      contents: write

    steps:
      # 1. Check out the repository code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Run the script (quote daily, learning + project highlight weekly)
      - name: Update profile sections
        run: python .github/scripts/update_profile.py

      # 4. Commit and push the changes (only if README actually changed)
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action (Profile Update)"
          git add README.md
          git diff --staged --quiet || git commit -m "📝 Daily profile update [skip ci]"
          git push
